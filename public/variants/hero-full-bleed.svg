<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 140" fill="none">
  <rect width="240" height="140" rx="8" fill="#0f0f1a"/>
  <!-- Full bleed gradient background -->
  <defs>
    <linearGradient id="fb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="224" height="124" rx="6" fill="url(#fb)" opacity="0.7"/>
  <!-- Dark overlay -->
  <rect x="8" y="8" width="224" height="124" rx="6" fill="#000000" opacity="0.35"/>
  <!-- Centered white text -->
  <rect x="60" y="34" width="120" height="10" rx="3" fill="#ffffff" opacity="0.9"/>
  <rect x="70" y="52" width="100" height="8" rx="3" fill="#ffffff" opacity="0.7"/>
  <rect x="75" y="68" width="90" height="5" rx="2" fill="#ffffff" opacity="0.35"/>
  <!-- White buttons -->
  <rect x="72" y="88" width="44" height="16" rx="8" fill="#ffffff" opacity="0.9"/>
  <rect x="124" y="88" width="44" height="16" rx="8" stroke="#ffffff" stroke-opacity="0.5" stroke-width="1"/>
</svg>
