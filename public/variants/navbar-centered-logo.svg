  <line x1="8" y1="40" x2="232" y2="40" stroke="#ffffff" stroke-opacity="0.06"/>
  <!-- Left links -->
  <rect x="30" y="20" width="24" height="5" rx="2" fill="#ffffff" opacity="0.3"/>
